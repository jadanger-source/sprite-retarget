<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Animator</title>
<style>
/* ── Design tokens ──────────────────────────────────────────────────────── */
:root {
  --bg:   #1a1a2e;
  --bg2:  #0d0d1a;
  --bg3:  #2a2a4e;
  --bd:   #3a3a5e;
  --fg:   #c0c0e0;
  --fg2:  #8080a0;
  --fg3:  #5a5a78;
  --ac:   #4ecdc4;
  --gn:   #3ddc84;
  --rd:   #ff6b6b;
}

/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  font-size: 12px;
  background: var(--bg);
  color: var(--fg);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* ── Scrollbars ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar              { width: 7px; height: 7px; }
::-webkit-scrollbar-track        { background: var(--bg2); }
::-webkit-scrollbar-thumb        { background: var(--bd);  border-radius: 3px; }
::-webkit-scrollbar-thumb:hover  { background: var(--fg3); }

/* ── Menu bar ───────────────────────────────────────────────────────────── */
#menubar {
  height: 30px;
  background: var(--bg2);
  border-bottom: 1px solid var(--bd);
  display: flex;
  align-items: center;
  padding: 0 4px;
  flex-shrink: 0;
  z-index: 200;
}
.menu-item {
  position: relative;
  padding: 4px 10px;
  cursor: pointer;
  border-radius: 3px;
  color: var(--fg);
  font-size: 12px;
}
.menu-item:hover { background: var(--bg3); }
.menu-dropdown {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background: var(--bg2);
  border: 1px solid var(--bd);
  min-width: 200px;
  z-index: 999;
  box-shadow: 4px 4px 12px rgba(0,0,0,.7);
  border-radius: 0 4px 4px 4px;
}
.menu-item:hover .menu-dropdown { display: block; }
.menu-entry {
  padding: 7px 14px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  color: var(--fg);
  white-space: nowrap;
}
.menu-entry:hover { background: var(--bg3); }
.menu-entry .accel { color: var(--fg3); font-size: 10px; }
.menu-sep { border-top: 1px solid var(--bd); margin: 3px 0; }

/* ── Main split layout ──────────────────────────────────────────────────── */
#main {
  flex: 1;
  display: flex;
  min-height: 0;
  overflow: hidden;
}

#left-pane {
  width: 430px;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

#sash {
  width: 4px;
  background: var(--bd);
  cursor: col-resize;
  flex-shrink: 0;
}
#sash:hover { background: var(--ac); }

#right-pane {
  flex: 1;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── Panel chrome ───────────────────────────────────────────────────────── */
.panel {
  border: 1px solid var(--bd);
  border-radius: 4px;
  margin: 4px 6px;
  flex-shrink: 0;
}
.panel-header {
  background: var(--bg3);
  padding: 3px 8px;
  font-size: 10px;
  color: var(--fg2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  border-bottom: 1px solid var(--bd);
  border-radius: 3px 3px 0 0;
}
.panel-body { padding: 7px 8px; }

/* ── File drop zones ────────────────────────────────────────────────────── */
.drop-zone {
  border: 2px dashed var(--bd);
  border-radius: 5px;
  padding: 8px 6px;
  text-align: center;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  color: var(--fg2);
  font-size: 10px;
  line-height: 1.5;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--ac); color: var(--ac); }
.drop-zone.loaded { border-style: solid; border-color: var(--gn); color: var(--gn); }
.drop-zone input[type=file] { display: none; }

/* ── Bone selector grid ─────────────────────────────────────────────────── */
#bone-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
  margin-bottom: 6px;
}
.bone-btn {
  padding: 5px 4px;
  border: 2px solid transparent;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 10px;
  font-weight: 600;
  text-align: center;
  outline: none;
  transition: border-color .1s;
}
.bone-btn.active { border-color: #fff !important; }

/* ── Generic control rows ───────────────────────────────────────────────── */
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 5px;
}
.ctrl-row label {
  min-width: 64px;
  color: var(--fg2);
  font-size: 11px;
  flex-shrink: 0;
}
.ctrl-row .val {
  min-width: 28px;
  text-align: right;
  color: var(--fg);
  font-size: 11px;
  flex-shrink: 0;
}
.ctrl-row input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--bd);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.ctrl-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--ac);
  cursor: pointer;
}
.ctrl-row-inline {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--fg2);
}
.ctrl-row-inline label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.ctrl-btn {
  background: var(--bg3);
  color: var(--fg);
  border: 1px solid var(--bd);
  padding: 3px 10px;
  cursor: pointer;
  font-family: inherit;
  font-size: 10px;
  border-radius: 3px;
  margin-left: auto;
}
.ctrl-btn:hover { border-color: var(--ac); color: var(--ac); }

/* ── Editor canvas area ─────────────────────────────────────────────────── */
#editor-wrap {
  flex: 1;
  overflow: auto;
  background: var(--bg2);
  cursor: crosshair;
  min-height: 0;
  position: relative;
}
#editor-canvas { display: block; }
#editor-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--fg3);
  font-size: 11px;
  pointer-events: none;
}

/* ── Parameters panel ───────────────────────────────────────────────────── */
.param-row {
  display: grid;
  grid-template-columns: 88px 1fr 36px;
  align-items: center;
  gap: 5px;
  margin-bottom: 4px;
}
.param-row label { color: var(--fg2); font-size: 11px; }
.param-row .val   { text-align: right; color: var(--fg); font-size: 11px; }
.param-row input[type=range] {
  -webkit-appearance: none;
  height: 3px;
  background: var(--bd);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
  width: 100%;
}
.param-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--ac);
  cursor: pointer;
}
.param-extras {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-top: 6px;
  font-size: 11px;
  color: var(--fg2);
}
.param-extras label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.fps-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
input.num-input {
  width: 46px;
  background: var(--bg3);
  color: var(--fg);
  border: 1px solid var(--bd);
  padding: 2px 4px;
  font-family: inherit;
  font-size: 11px;
  border-radius: 3px;
  text-align: right;
}
input.num-input:focus { outline: 1px solid var(--ac); }

/* ── Preview section ────────────────────────────────────────────────────── */
#preview-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  margin: 4px 6px;
  border: 1px solid var(--bd);
  border-radius: 4px;
  overflow: hidden;
}
#preview-header {
  background: var(--bg3);
  padding: 3px 8px;
  font-size: 10px;
  color: var(--fg2);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}
#preview-canvas {
  flex: 1;
  display: block;
  background: var(--bg2);
  width: 100%;
  min-height: 0;
}

/* ── Transport bar ──────────────────────────────────────────────────────── */
#transport {
  flex-shrink: 0;
  background: var(--bg2);
  border-top: 1px solid var(--bd);
  padding: 5px 7px;
}
#scrubber-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 5px;
}
#scrubber {
  flex: 1;
  -webkit-appearance: none;
  height: 3px;
  background: var(--bd);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
#scrubber::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: var(--ac);
  cursor: pointer;
}
#frame-lbl { min-width: 60px; text-align: right; color: var(--fg2); font-size: 10px; }
#btn-row { display: flex; gap: 4px; }
.tb {
  background: var(--bg3);
  color: var(--fg);
  border: 1px solid var(--bd);
  padding: 4px 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
  border-radius: 3px;
  min-width: 30px;
  text-align: center;
}
.tb:hover { border-color: var(--ac); }
#play-btn { min-width: 72px; }
.tb.active { background: var(--ac); border-color: var(--ac); color: #000; font-weight: 600; }

/* ── Status bar ─────────────────────────────────────────────────────────── */
#statusbar {
  flex-shrink: 0;
  height: 20px;
  background: var(--bg2);
  border-top: 1px solid var(--bd);
  padding: 2px 8px;
  font-size: 10px;
  color: var(--fg2);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
</style>
</head>
<body>

<!-- ── Menu bar ──────────────────────────────────────────────────────────── -->
<div id="menubar">
  <div class="menu-item">File
    <div class="menu-dropdown">
      <div class="menu-entry" id="m-open-sprite">Load Sprite…   <span class="accel">Ctrl+O</span></div>
      <div class="menu-entry" id="m-open-json">Load JSON…     <span class="accel">Ctrl+J</span></div>
      <div class="menu-sep"></div>
      <div class="menu-entry" id="m-export-gif">Export GIF…    <span class="accel">Ctrl+G</span></div>
      <div class="menu-entry" id="m-export-frames">Export Frames… <span class="accel">Ctrl+E</span></div>
      <div class="menu-sep"></div>
      <div class="menu-entry" id="m-quit">Quit            <span class="accel">Ctrl+Q</span></div>
    </div>
  </div>
</div>

<!-- ── Main area ─────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- Left pane ──────────────────────────────────────────────────────────── -->
  <div id="left-pane">

    <!-- File loading -->
    <div class="panel">
      <div class="panel-header">Files</div>
      <div class="panel-body" style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div class="drop-zone" id="sprite-drop">
          🧍 Sprite PNG
          <div id="sprite-drop-name" style="font-size:9px;margin-top:2px;opacity:.7">drop or click</div>
          <input type="file" id="sprite-file-in" accept="image/png,image/gif,image/jpeg,image/webp">
        </div>
        <div class="drop-zone" id="json-drop">
          📊 Pose JSON
          <div id="json-drop-name" style="font-size:9px;margin-top:2px;opacity:.7">drop or click</div>
          <input type="file" id="json-file-in" accept=".json">
        </div>
      </div>
    </div>

    <!-- Bone Painter -->
    <div class="panel">
      <div class="panel-header">Bone Painter</div>
      <div class="panel-body">
        <div id="bone-grid"><!-- populated by JS --></div>
        <div class="ctrl-row">
          <label>Brush px:</label>
          <input type="range" id="brush-sl" min="2" max="80" value="15">
          <span class="val" id="brush-val">15</span>
        </div>
        <div class="ctrl-row-inline">
          <label><input type="checkbox" id="overlay-chk" checked> Show overlay</label>
          <button class="ctrl-btn" id="auto-assign-btn">Auto-assign</button>
        </div>
      </div>
    </div>

    <!-- Editor canvas (bone painter canvas) -->
    <div id="editor-wrap">
      <canvas id="editor-canvas"></canvas>
      <div id="editor-placeholder">Load a sprite to begin</div>
    </div>

  </div><!-- /left-pane -->

  <div id="sash"></div>

  <!-- Right pane ─────────────────────────────────────────────────────────── -->
  <div id="right-pane">

    <!-- Parameters -->
    <div class="panel">
      <div class="panel-header">Parameters</div>
      <div class="panel-body">
        <div class="param-row">
          <label>Dampening</label>
          <input type="range" id="damp-sl" min="0" max="1.5" step="0.01" value="0.65">
          <span class="val" id="damp-val">0.65</span>
        </div>
        <div class="param-row">
          <label>Max Angle</label>
          <input type="range" id="maxang-sl" min="0.3" max="3.0" step="0.01" value="1.20">
          <span class="val" id="maxang-val">1.20</span>
        </div>
        <div class="param-row">
          <label>Y-Scale</label>
          <input type="range" id="yscale-sl" min="0" max="1.0" step="0.01" value="0.40">
          <span class="val" id="yscale-val">0.40</span>
        </div>
        <div class="param-row">
          <label>Dil Radius</label>
          <input type="range" id="dil-sl" min="0" max="20" step="1" value="8">
          <span class="val" id="dil-val">8</span>
        </div>
        <div class="param-extras">
          <label><input type="checkbox" id="mirror-chk"> Mirror L/R</label>
          <div class="fps-wrap">
            <span>FPS:</span>
            <input type="number" class="num-input" id="fps-in" min="1" max="60" value="12">
          </div>
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div id="preview-section">
      <div id="preview-header">Preview</div>
      <canvas id="preview-canvas"></canvas>
      <div id="transport">
        <div id="scrubber-row">
          <input type="range" id="scrubber" min="0" max="0" value="0" step="1">
          <span id="frame-lbl">0 / 0</span>
        </div>
        <div id="btn-row">
          <button class="tb" id="btn-first" title="First frame (Home)">|◀</button>
          <button class="tb" id="btn-back"  title="Previous frame (←)">◀</button>
          <button class="tb" id="play-btn"  title="Play / Pause (Space)">▶ Play</button>
          <button class="tb" id="btn-fwd"   title="Next frame (→)">▶</button>
          <button class="tb" id="btn-last"  title="Last frame (End)">▶|</button>
        </div>
      </div>
    </div>

  </div><!-- /right-pane -->

</div><!-- /main -->

<!-- ── Status bar ────────────────────────────────────────────────────────── -->
<div id="statusbar">No data loaded</div>

<!-- ── Hidden file inputs for menu ──────────────────────────────────────── -->
<input type="file" id="menu-sprite-in" accept="image/png,image/gif,image/jpeg,image/webp" style="display:none">
<input type="file" id="menu-json-in"   accept=".json" style="display:none">

<script>
'use strict';
// ── Skeleton constants (mirrors sprite_animator_gui.py) ───────────────────
const J = {
  HEAD:0, LS:1, RS:2, LE:3, RE:4, LW:5, RW:6,
  LH:7,  RH:8, LK:9, RK:10, LA:11, RA:12, NECK:13, PELVIS:14
};
const DEFAULT_JOINTS = [
  [0.50,0.08],[0.22,0.33],[0.77,0.33],
  [0.15,0.49],[0.84,0.49],[0.11,0.63],
  [0.87,0.63],[0.36,0.49],[0.60,0.49],
  [0.33,0.78],[0.64,0.78],[0.31,0.92],
  [0.67,0.94],[0.50,0.28],[0.50,0.49],
];
const BONE_DEFS = [
  {id:0, name:'head',      pivot:13, end:0 },
  {id:1, name:'torso',     pivot:14, end:13},
  {id:2, name:'upperArmL', pivot:1,  end:3 },
  {id:3, name:'forearmL',  pivot:3,  end:5 },
  {id:4, name:'upperArmR', pivot:2,  end:4 },
  {id:5, name:'forearmR',  pivot:4,  end:6 },
  {id:6, name:'thighL',    pivot:7,  end:9 },
  {id:7, name:'shinL',     pivot:9,  end:11},
  {id:8, name:'thighR',    pivot:8,  end:10},
  {id:9, name:'shinR',     pivot:10, end:12},
];
const DRAW_ORDER  = [6,7,8,9,1,0,4,5,2,3];
const MIRROR_IDX  = [0,2,1,4,3,6,5,8,7,10,9,12,11,13,14];
const CANVAS_PAD  = 200;
const BONE_COLORS = [
  [255,200, 50],  // 0  head       gold
  [100,200,255],  // 1  torso      sky-blue
  [ 50,210,110],  // 2  upperArmL  green
  [ 30,150, 60],  // 3  forearmL   dark-green
  [255,130, 50],  // 4  upperArmR  orange
  [200, 80, 20],  // 5  forearmR   burnt-orange
  [160,110,255],  // 6  thighL     purple
  [100, 60,200],  // 7  shinL      dark-purple
  [255, 80,140],  // 8  thighR     pink
  [190, 30, 80],  // 9  shinR      crimson
];
const BONE_NAMES = ['head','torso','uArmL','fArmL','uArmR','fArmR','thighL','shinL','thighR','shinR'];
const OVERLAY_ALPHA = 160;

// ── Application state ─────────────────────────────────────────────────────
const S = {
  // loaded data
  spriteImg:    null,   // HTMLImageElement
  spriteW:      0,
  spriteH:      0,
  spritePixels: null,   // Uint8ClampedArray RGBA flat (H*W*4)

  frames:  null,        // [{x,y,v}×15] per frame
  fpsSrc:  12,          // fps from JSON

  // joint positions matched to sprite
  joints: DEFAULT_JOINTS.map(j => [...j]),  // [[xNorm,yNorm]×15]
  spPx:   null,         // [[px,py]×15] in sprite pixels

  // bone data
  alpha:        null,   // Uint8Array H×W
  boneAssign:   null,   // Uint8Array H×W  (0-9 = bone, 255 = unassigned)
  boneCanvases: {},     // {0..9 → HTMLCanvasElement}

  // ui
  activeBone:  1,
  brushRadius: 15,
  showOverlay: true,
  editorScale: 1.0,
  painting:    false,

  // playback
  currentFrame: 0,
  playing:      false,
  playTimer:    null,

  // render cache
  renderCache: new Map(),

  // live parameters
  dampening: 0.65,
  maxAngle:  1.20,
  yScale:    0.40,
  dilRadius: 8,
  mirror:    false,
  animFps:   12,
};

// ── Utilities ─────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const setStatus = msg => { $('statusbar').textContent = msg; };
const sleep = ms => new Promise(r => setTimeout(r, ms));
const toHex = (r,g,b) => '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');

// ── Bone selector grid ────────────────────────────────────────────────────
(function buildBoneGrid() {
  const grid = $('bone-grid');
  BONE_NAMES.forEach((name, i) => {
    const [r,g,b] = BONE_COLORS[i];
    const lum = 0.299*r + 0.587*g + 0.114*b;
    const btn = document.createElement('button');
    btn.className = 'bone-btn' + (i === S.activeBone ? ' active' : '');
    btn.textContent = name;
    btn.style.background = toHex(r,g,b);
    btn.style.color = lum > 140 ? '#000' : '#fff';
    btn.dataset.boneId = i;
    btn.addEventListener('click', () => {
      S.activeBone = i;
      document.querySelectorAll('.bone-btn').forEach((b,j) =>
        b.classList.toggle('active', j === i));
    });
    grid.appendChild(btn);
  });
})();

// ── Slider value labels ───────────────────────────────────────────────────
function bindLabel(slId, valId, fmt) {
  const sl = $(slId), vl = $(valId);
  vl.textContent = fmt(sl.value);
  sl.addEventListener('input', () => { vl.textContent = fmt(sl.value); });
}
bindLabel('brush-sl',  'brush-val',  v => Math.round(v));
bindLabel('damp-sl',   'damp-val',   v => parseFloat(v).toFixed(2));
bindLabel('maxang-sl', 'maxang-val', v => parseFloat(v).toFixed(2));
bindLabel('yscale-sl', 'yscale-val', v => parseFloat(v).toFixed(2));
bindLabel('dil-sl',    'dil-val',    v => Math.round(v));

// ── Drop zone wiring ──────────────────────────────────────────────────────
function wireDropZone(zoneId, inputId, handler) {
  const zone = $(zoneId), inp = $(inputId);
  zone.addEventListener('click', e => { if (e.target === inp) return; inp.value=''; inp.click(); });
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', ()  => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handler(e.dataTransfer.files[0]);
  });
  inp.addEventListener('change', () => { if (inp.files[0]) handler(inp.files[0]); });
}
// Handlers wired in later steps – placeholders keep drop zones functional now
wireDropZone('sprite-drop', 'sprite-file-in', f => loadSprite(f));
wireDropZone('json-drop',   'json-file-in',   f => loadJSON(f));

// ── Menu wiring ────────────────────────────────────────────────────────────
$('m-open-sprite').addEventListener('click',  () => { $('menu-sprite-in').value=''; $('menu-sprite-in').click(); });
$('m-open-json'  ).addEventListener('click',  () => { $('menu-json-in'  ).value=''; $('menu-json-in'  ).click(); });
$('m-export-gif'   ).addEventListener('click', () => exportGIF());
$('m-export-frames').addEventListener('click', () => exportFrames());
$('m-quit'         ).addEventListener('click', () => window.close());
$('menu-sprite-in').addEventListener('change', function(){ if(this.files[0]) loadSprite(this.files[0]); });
$('menu-json-in'  ).addEventListener('change', function(){ if(this.files[0]) loadJSON(this.files[0]);   });

// ── Pane sash resize ──────────────────────────────────────────────────────
(function() {
  const sash = $('sash'), left = $('left-pane'), main = $('main');
  let dragging = false;
  sash.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = main.getBoundingClientRect();
    const w = Math.max(240, Math.min(e.clientX - rect.left, rect.width - 260));
    left.style.width = w + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
})();

// ── Auto-assign / overlay checkbox stubs ─────────────────────────────────
$('auto-assign-btn').addEventListener('click', () => autoAssign());
$('overlay-chk').addEventListener('change', e => {
  S.showOverlay = e.target.checked;
  refreshEditor();
});

// ── Preview canvas – responsive sizing via ResizeObserver ─────────────────
const previewCanvas = $('preview-canvas');
const previewCtx    = previewCanvas.getContext('2d');

function resizePreviewCanvas() {
  const pSec      = $('preview-section');
  const transport = $('transport');
  const header    = $('preview-header');
  const cw = pSec.clientWidth;
  const ch = pSec.clientHeight - transport.offsetHeight - header.offsetHeight;
  previewCanvas.width  = Math.max(1, cw);
  previewCanvas.height = Math.max(1, ch);
}

new ResizeObserver(() => { resizePreviewCanvas(); drawPreview(); })
  .observe($('preview-section'));

function drawPreview() {
  // Implemented in Step 4 – placeholder draws a message
  resizePreviewCanvas();
  const cv = previewCanvas;
  previewCtx.fillStyle = '#0d0d1a';
  previewCtx.fillRect(0, 0, cv.width, cv.height);
  if (!S.spriteImg || !S.frames) {
    previewCtx.fillStyle = '#4060a0';
    previewCtx.font = '12px monospace';
    previewCtx.textAlign = 'center';
    previewCtx.fillText('Load sprite + JSON to preview', cv.width/2, cv.height/2);
  }
}

// ── Stub functions filled in subsequent steps ─────────────────────────────
function loadSprite(file)  { setStatus('loadSprite – wired in Step 2: ' + file.name); }
function loadJSON(file)    { setStatus('loadJSON – wired in Step 2: '   + file.name); }
function autoAssign()      { setStatus('autoAssign – wired in Step 2'); }
function refreshEditor()   { /* Step 3 */ }
function exportGIF()       { setStatus('Export GIF – wired in Step 6'); }
function exportFrames()    { setStatus('Export Frames – wired in Step 6'); }

// ── Init ──────────────────────────────────────────────────────────────────
drawPreview();
setStatus('Step 1 complete – UI shell ready');
</script>
</body>
