<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite Animator</title>
<style>
:root{--b0:#0a0a0f;--b1:#12121a;--b3:#1e1e2e;--bd:#2a2a3e;--t:#e8e8f0;--t2:#8888a8;--t3:#5a5a78;--ac:#4ecdc4;--ac2:#4ecdc422;--gn:#3ddc84;--rd:#ff6b6b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace,sans-serif;background:var(--b0);color:var(--t);height:100vh;overflow:hidden;user-select:none}
.hdr{height:44px;background:var(--b1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px}
.hdr h1{font-size:12px;font-weight:600;color:var(--ac)}.hdr .st{font-size:11px;color:var(--t2);margin-left:auto}
.hdr .st.ok{color:var(--gn)}.hdr .st.err{color:var(--rd)}
.main{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 44px)}
.pnl{background:var(--b1);border-right:1px solid var(--bd);overflow-y:auto;display:flex;flex-direction:column}
.sec{padding:12px 14px;border-bottom:1px solid var(--bd)}.sec h3{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px}
.drp{border:2px dashed var(--bd);border-radius:6px;padding:16px 12px;text-align:center;cursor:pointer;transition:all .15s}
.drp:hover,.drp.over{border-color:var(--ac);background:var(--ac2)}.drp input{display:none}
.drp .lb{font-size:11px;color:var(--t2)}.drp .sb{font-size:9px;color:var(--t3);margin-top:2px}
.drp.ok{border-color:var(--gn);border-style:solid}.drp.ok .lb{color:var(--gn)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;border:1px solid var(--bd);border-radius:5px;background:var(--b3);color:var(--t);font-family:inherit;font-size:11px;cursor:pointer;width:100%;margin-top:6px;transition:all .15s}
.btn:hover{border-color:var(--ac)}.btn.p{background:var(--ac);border-color:var(--ac);color:#000;font-weight:600}
.btn.p:hover{opacity:.9}.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.sr{display:flex;align-items:center;gap:6px;margin-bottom:6px}.sr label{font-size:10px;color:var(--t2);min-width:80px}
.sr input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:var(--bd);border-radius:2px;outline:none}
.sr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--ac);cursor:pointer}
.sr .v{font-size:10px;color:var(--t3);min-width:28px;text-align:right}
.prg{width:100%;height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:8px}
.prg .f{height:100%;background:var(--ac);transition:width .05s;width:0}
.inf{font-size:10px;color:var(--t3);margin-top:6px}
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--b0)}
.cvs-wrap{flex:1;position:relative;overflow:hidden;background:#111}
#mainCanvas{display:block;cursor:crosshair}
.pb{height:50px;background:var(--b1);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.ply{width:28px;height:28px;border-radius:50%;background:var(--ac);border:none;cursor:pointer;color:#000;font-size:12px;flex-shrink:0;font-family:inherit}
.ply:hover{opacity:.9}
#timeline{-webkit-appearance:none;flex:1;height:3px;background:var(--bd);border-radius:2px;outline:none}
#timeline::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--ac);cursor:pointer}
.fl{font-size:10px;color:var(--t2);min-width:55px;text-align:right}
.tabs{display:flex;border-bottom:1px solid var(--bd)}
.tab{flex:1;padding:8px;font-size:10px;color:var(--t3);cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:all .1s}
.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.tab-pane{display:none}.tab-pane.active{display:block}
.joint-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 7px;border-radius:4px;font-size:9px;cursor:pointer;border:1px solid var(--bd);background:var(--b3);color:var(--t2);margin:2px}
.joint-chip.sel{border-color:var(--ac);color:var(--ac);background:var(--ac2)}
.exp-bar{background:var(--b3);border-top:1px solid var(--bd);padding:8px 14px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.exp-bar .btn{margin:0;flex:1}
</style>
</head>
<body>
<div class="hdr"><h1>SPRITE ANIMATOR</h1><span class="st" id="status">load sprite + pose JSON</span></div>
<div class="main">
<div class="pnl">
  <div class="sec"><h3>Files</h3>
    <div class="drp" id="spriteDrp"><div style="font-size:18px;margin-bottom:4px">🧍</div><div class="lb">Drop Sprite PNG</div><div class="sb">785×1302 recommended</div><input type="file" id="spriteIn" accept="image/png,image/gif"></div>
    <div class="drp" style="margin-top:8px" id="jsonDrp"><div style="font-size:18px;margin-bottom:4px">📊</div><div class="lb">Drop Pose JSON</div><div class="sb">motion_data.json</div><input type="file" id="jsonIn" accept=".json"></div>
  </div>
  <div class="sec" style="flex:1">
    <div class="tabs">
      <div class="tab active" data-tab="joints">Joints</div>
      <div class="tab" data-tab="settings">Settings</div>
      <div class="tab" data-tab="export">Export</div>
    </div>
    <div class="tab-pane active" id="tab-joints" style="padding-top:8px">
      <div class="inf" style="margin-top:0">Click joints to select, drag on canvas to reposition.</div>
      <div id="jointChips" style="margin-top:8px"></div>
      <button class="btn" id="resetJoints" style="margin-top:8px">Reset to Defaults</button>
      <button class="btn p" id="buildMeshBtn" disabled style="margin-top:6px">Build Mesh &amp; Animate</button>
      <div class="prg" id="buildPrg"><div class="f" id="buildPrgF"></div></div>
      <div class="inf" id="meshInfo"></div>
    </div>
    <div class="tab-pane" id="tab-settings" style="padding-top:8px">
      <div class="sr"><label>Mesh Density</label><input type="range" id="meshDensity" min="6" max="30" value="12"><span class="v" id="meshDensityV">12px</span></div>
      <div class="sr"><label>Joint Blend</label><input type="range" id="blendRadius" min="0" max="60" value="35"><span class="v" id="blendRadiusV">35px</span></div>
      <div class="sr"><label>Hip Bounce</label><input type="range" id="yScale" min="0" max="200" value="80"><span class="v" id="yScaleV">0.80</span></div>
      <div class="sr"><label>Show Mesh</label><input type="range" id="showMesh" min="0" max="1" value="0"><span class="v" id="showMeshV">off</span></div>
      <div class="sr"><label>Show Skel</label><input type="range" id="showSkel" min="0" max="1" value="0"><span class="v" id="showSkelV">off</span></div>
      <div class="sr"><label>Bone Colors</label><input type="range" id="showBones" min="0" max="1" value="0"><span class="v" id="showBonesV">off</span></div>
    </div>
    <div class="tab-pane" id="tab-export" style="padding-top:8px">
      <div class="sr"><label>Columns</label><input type="range" id="expCols" min="1" max="16" value="8"><span class="v" id="expColsV">8</span></div>
      <div class="sr"><label>Scale</label><input type="range" id="expScale" min="1" max="4" value="1"><span class="v" id="expScaleV">1×</span></div>
      <div class="inf">Exports all frames as a single PNG sprite sheet.</div>
    </div>
  </div>
  <div class="exp-bar">
    <button class="btn p" id="exportBtn" disabled>⬇ Export Sprite Sheet</button>
  </div>
</div>
<div class="right">
  <div class="cvs-wrap" id="canvasWrap"><canvas id="mainCanvas"></canvas></div>
  <div class="pb">
    <button class="ply" id="playBtn">▶</button>
    <input type="range" id="timeline" min="0" max="0" value="0">
    <span class="fl" id="frameLabel">0 / 0</span>
  </div>
</div>
</div>
<script>
// ─── Constants ───────────────────────────────────────────────────────────────
const CANVAS_PAD = 200; // extra pixels around each frame so arms don't clip
const J = { HEAD:0,LS:1,RS:2,LE:3,RE:4,LW:5,RW:6,LH:7,RH:8,LK:9,RK:10,LA:11,RA:12,NECK:13,PELVIS:14 };
const J_NAMES = ['Head','L Shoulder','R Shoulder','L Elbow','R Elbow','L Wrist','R Wrist',
                 'L Hip','R Hip','L Knee','R Knee','L Ankle','R Ankle','Neck','Pelvis'];
const J_COLORS = ['#ff9f43','#48dbfb','#ff6b9d','#48dbfb','#ff6b9d','#48dbfb','#ff6b9d',
                  '#54a0ff','#ee5a24','#54a0ff','#ee5a24','#54a0ff','#ee5a24','#ffd32a','#c8d6e5'];

const DEFAULT_JOINTS = [
  {x:0.50,y:0.08},{x:0.22,y:0.33},{x:0.77,y:0.33},
  {x:0.15,y:0.49},{x:0.84,y:0.49},{x:0.11,y:0.63},
  {x:0.87,y:0.63},{x:0.36,y:0.49},{x:0.60,y:0.49},
  {x:0.33,y:0.78},{x:0.64,y:0.78},{x:0.31,y:0.92},
  {x:0.67,y:0.94},{x:0.50,y:0.28},{x:0.50,y:0.49}
];

// 10 rendering bones
const BONE_DEFS = [
  {id:0,name:'head',     pivot:J.NECK,  end:J.HEAD, layer:1},
  {id:1,name:'torso',    pivot:J.PELVIS,end:J.NECK, layer:1},
  {id:2,name:'upperArmL',pivot:J.LS,   end:J.LE,   layer:2},
  {id:3,name:'forearmL', pivot:J.LE,   end:J.LW,   layer:2},
  {id:4,name:'upperArmR',pivot:J.RS,   end:J.RE,   layer:2},
  {id:5,name:'forearmR', pivot:J.RE,   end:J.RW,   layer:2},
  {id:6,name:'thighL',   pivot:J.LH,   end:J.LK,   layer:0},
  {id:7,name:'shinL',    pivot:J.LK,   end:J.LA,   layer:0},
  {id:8,name:'thighR',   pivot:J.RH,   end:J.RK,   layer:0},
  {id:9,name:'shinR',    pivot:J.RK,   end:J.RA,   layer:0},
];
// Debug colors per bone
const BONE_DBG_COLORS = [
  '#ffd32a','#c8d6e5','#48dbfb','#00d2d3','#ff6b9d','#ff9ff3',
  '#54a0ff','#48dbfb','#ee5a24','#ff9f43'
];
// Parent bone for each bone (-1 = root)
const BONE_PARENT = [-1,-1,1,2,1,4,1,6,1,8];
// Draw order: legs → torso → head → right arm (back) → left arm (front)
const DRAW_ORDER = [6,7,8,9,1,0,4,5,2,3];
// Mirror map: swap L/R to fix MediaPipe handedness, then flip x
const MIRROR_IDX = [0,2,1,4,3,6,5,8,7,10,9,12,11,13,14];

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  spriteImg:null, spriteW:0, spriteH:0,
  poseData:null,
  joints:DEFAULT_JOINTS.map(j=>({...j})),
  selectedJoint:-1,
  mesh:null,    // {verts, tris, vertBone, triBone, vertBlend}
  frames:[],    // [{newJoints, boneDeltas, transformed}]
  currentFrame:0,
  playing:false,
  alphaMap:null,
};

// ─── DOM ───────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const statusEl = document.getElementById('status');
const playBtn = document.getElementById('playBtn');
const timeline = document.getElementById('timeline');
const frameLabel = document.getElementById('frameLabel');
const buildMeshBtn = document.getElementById('buildMeshBtn');
const buildPrgF = document.getElementById('buildPrgF');
const meshInfo = document.getElementById('meshInfo');
const exportBtn = document.getElementById('exportBtn');

function setStatus(msg, type='') {
  statusEl.textContent = msg;
  statusEl.className = 'st' + (type ? ' '+type : '');
}

// ─── File drops ───────────────────────────────────────────────────────────────
function setupDrop(zone, inp, onFile) {
  zone.addEventListener('click', e => { if(e.target!==inp){e.preventDefault(); inp.value=''; inp.click();} });
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('over'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('over'); if(e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]); });
  inp.addEventListener('change', () => { if(inp.files[0]) onFile(inp.files[0]); });
}
setupDrop(document.getElementById('spriteDrp'), document.getElementById('spriteIn'), loadSprite);
setupDrop(document.getElementById('jsonDrp'),   document.getElementById('jsonIn'),   loadJSON);

function loadSprite(file) {
  const drp = document.getElementById('spriteDrp');
  drp.querySelector('.lb').textContent = 'Loading...';
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    state.spriteImg = img; state.spriteW = img.width; state.spriteH = img.height;
    extractAlpha(img);
    drp.classList.add('ok');
    drp.querySelector('.lb').textContent = `${file.name} (${img.width}×${img.height})`;
    setStatus('sprite loaded', 'ok');
    buildMeshBtn.disabled = !state.poseData;
    renderSetup(); drawFrame();
  };
  img.onerror = () => setStatus('failed to load image', 'err');
  img.src = url;
}

function loadJSON(file) {
  const drp = document.getElementById('jsonDrp');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.frames || !data.fps) throw new Error('missing frames/fps');
      state.poseData = data;
      state.poseData.mirrored = data.frames.map(mirrorFrame);
      drp.classList.add('ok');
      drp.querySelector('.lb').textContent = `${file.name} (${data.frameCount}f @ ${data.fps}fps)`;
      timeline.max = data.frameCount - 1; timeline.value = 0;
      frameLabel.textContent = `1 / ${data.frameCount}`;
      setStatus(`pose loaded: ${data.frameCount} frames`, 'ok');
      buildMeshBtn.disabled = !state.spriteImg;
    } catch(err) { setStatus('invalid JSON: '+err.message, 'err'); }
  };
  reader.readAsText(file);
}

function mirrorFrame(frame) {
  return MIRROR_IDX.map(i => ({ x: 1 - frame[i].x, y: frame[i].y, v: frame[i].v }));
}

// ─── Alpha ─────────────────────────────────────────────────────────────────────
function extractAlpha(img) {
  const oc = document.createElement('canvas');
  oc.width = img.width; oc.height = img.height;
  const ox = oc.getContext('2d'); ox.drawImage(img, 0, 0);
  const d = ox.getImageData(0, 0, img.width, img.height).data;
  state.alphaMap = new Uint8Array(img.width * img.height);
  for (let i = 0; i < state.alphaMap.length; i++) state.alphaMap[i] = d[i*4+3];
}

function getAlpha(x, y) {
  const ix = Math.max(0, Math.min(state.spriteW-1, Math.round(x)));
  const iy = Math.max(0, Math.min(state.spriteH-1, Math.round(y)));
  return state.alphaMap ? state.alphaMap[iy * state.spriteW + ix] : 255;
}

// ─── Canvas sizing ────────────────────────────────────────────────────────────
let viewScale = 1, viewOffX = 0, viewOffY = 0;
function renderSetup() {
  if (!state.spriteImg) return;
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  canvas.width = ww; canvas.height = wh;
  // Scale to fit the padded frame so extended arms are visible
  const vw = state.spriteW + 2*CANVAS_PAD, vh = state.spriteH + 2*CANVAS_PAD;
  const s = Math.min(ww / vw, wh / vh) * 0.95;
  viewScale = s;
  // Center on the padded virtual frame; sprite origin is at (CANVAS_PAD, CANVAS_PAD)
  viewOffX = (ww - vw * s) / 2 + CANVAS_PAD * s;
  viewOffY = (wh - vh * s) / 2 + CANVAS_PAD * s;
}
window.addEventListener('resize', () => { renderSetup(); drawFrame(); });

// ─── Joint UI ─────────────────────────────────────────────────────────────────
function buildJointChips() {
  const cont = document.getElementById('jointChips');
  cont.innerHTML = '';
  J_NAMES.forEach((name, i) => {
    const chip = document.createElement('span');
    chip.className = 'joint-chip' + (state.selectedJoint === i ? ' sel' : '');
    if (state.selectedJoint === i) chip.style.borderColor = J_COLORS[i];
    chip.textContent = name;
    chip.onclick = () => { state.selectedJoint = (state.selectedJoint === i) ? -1 : i; buildJointChips(); drawFrame(); };
    cont.appendChild(chip);
  });
}
buildJointChips();

document.getElementById('resetJoints').addEventListener('click', () => {
  state.joints = DEFAULT_JOINTS.map(j=>({...j}));
  state.mesh = null; state.frames = []; exportBtn.disabled = true;
  drawFrame();
});

// ─── Canvas mouse ──────────────────────────────────────────────────────────────
let dragging = -1;
canvas.addEventListener('mousedown', e => {
  if (!state.spriteImg) return;
  const {sx, sy} = c2s(e.offsetX, e.offsetY);
  let best = -1, bestD = 20 / viewScale;
  state.joints.forEach((j, i) => {
    const d = Math.hypot(j.x * state.spriteW - sx, j.y * state.spriteH - sy);
    if (d < bestD) { bestD = d; best = i; }
  });
  if (best >= 0) { dragging = best; state.selectedJoint = best; buildJointChips(); }
});
canvas.addEventListener('mousemove', e => {
  if (dragging < 0 || !state.spriteImg) return;
  const {sx, sy} = c2s(e.offsetX, e.offsetY);
  state.joints[dragging] = {
    x: Math.max(0, Math.min(1, sx / state.spriteW)),
    y: Math.max(0, Math.min(1, sy / state.spriteH))
  };
  // Keep virtual joints in sync
  if (dragging !== J.NECK) state.joints[J.NECK] = midpoint(state.joints[J.LS], state.joints[J.RS]);
  if (dragging !== J.PELVIS) state.joints[J.PELVIS] = midpoint(state.joints[J.LH], state.joints[J.RH]);
  if (state.mesh) { state.mesh = null; state.frames = []; exportBtn.disabled = true; }
  drawFrame();
});
canvas.addEventListener('mouseup', () => dragging = -1);
canvas.addEventListener('mouseleave', () => dragging = -1);

function c2s(cx, cy) { return { sx:(cx-viewOffX)/viewScale, sy:(cy-viewOffY)/viewScale }; }
function midpoint(a, b) { return { x:(a.x+b.x)/2, y:(a.y+b.y)/2 }; }

// ─── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-'+tab.dataset.tab).classList.add('active');
  };
});

// ─── Sliders ──────────────────────────────────────────────────────────────────
function bindSlider(id, valId, fmt, onChange) {
  const sl = document.getElementById(id), vl = document.getElementById(valId);
  vl.textContent = fmt(sl.value);
  sl.addEventListener('input', () => { vl.textContent = fmt(sl.value); if(onChange) onChange(); });
}
bindSlider('meshDensity','meshDensityV', v => v+'px');
bindSlider('blendRadius','blendRadiusV', v => v+'px');
bindSlider('yScale','yScaleV', v => (v/100).toFixed(2));
bindSlider('showMesh','showMeshV', v => +v?'on':'off', drawFrame);
bindSlider('showSkel','showSkelV', v => +v?'on':'off', drawFrame);
bindSlider('showBones','showBonesV', v => +v?'on':'off', drawFrame);
bindSlider('expCols','expColsV', v => v);
bindSlider('expScale','expScaleV', v => v+'×');

// ─── Segmentation ─────────────────────────────────────────────────────────────
function segBoneXY(x, y, jp) {
  // jp: joint positions in pixels
  const neckY = jp[J.NECK].y;
  const lSX = jp[J.LS].x, rSX = jp[J.RS].x;
  const lHX = jp[J.LH].x, rHX = jp[J.RH].x;

  function segDist(ax, ay, bx, by) {
    const dx=bx-ax, dy=by-ay, l2=dx*dx+dy*dy;
    if (l2 < 1) return Math.hypot(x-ax, y-ay);
    const t = Math.max(0, Math.min(1, ((x-ax)*dx+(y-ay)*dy)/l2));
    return Math.hypot(x-(ax+t*dx), y-(ay+t*dy));
  }

  // Head: above neck
  if (y <= neckY) return 0;

  // For ALL pixels below the neck, compare distance to every body segment.
  // (No hard pelvis cutoff — arms extend below pelvis in rest pose and would
  //  otherwise be mis-assigned to leg bones, causing elbow separation.)
  const dTorso = segDist(jp[J.PELVIS].x,jp[J.PELVIS].y, jp[J.NECK].x,jp[J.NECK].y);
  const dUAL   = segDist(jp[J.LS].x,jp[J.LS].y, jp[J.LE].x,jp[J.LE].y);
  const dFAL   = segDist(jp[J.LE].x,jp[J.LE].y, jp[J.LW].x,jp[J.LW].y);
  const dUAR   = segDist(jp[J.RS].x,jp[J.RS].y, jp[J.RE].x,jp[J.RE].y);
  const dFAR   = segDist(jp[J.RE].x,jp[J.RE].y, jp[J.RW].x,jp[J.RW].y);
  const dTL    = segDist(jp[J.LH].x,jp[J.LH].y, jp[J.LK].x,jp[J.LK].y);
  const dSL    = segDist(jp[J.LK].x,jp[J.LK].y, jp[J.LA].x,jp[J.LA].y);
  const dTR    = segDist(jp[J.RH].x,jp[J.RH].y, jp[J.RK].x,jp[J.RK].y);
  const dSR    = segDist(jp[J.RK].x,jp[J.RK].y, jp[J.RA].x,jp[J.RA].y);

  // Bias torso so central trunk pixels stay on the torso bone,
  // but NOT near shoulder joints — those pixels belong to the arm bones.
  const torsoLeft = Math.min(lSX, lHX), torsoRight = Math.max(rSX, rHX);
  const inTorso = x >= torsoLeft && x <= torsoRight;
  const dToLS = Math.hypot(x - jp[J.LS].x, y - jp[J.LS].y);
  const dToRS = Math.hypot(x - jp[J.RS].x, y - jp[J.RS].y);
  const nearShoulder = Math.min(dToLS, dToRS) < 55;
  const adjTorso = (inTorso && !nearShoulder) ? dTorso * 0.6 : dTorso;

  const scores  = [adjTorso, dUAL, dFAL, dUAR, dFAR, dTL, dSL, dTR, dSR];
  const boneIds = [1,        2,    3,    4,    5,    6,   7,   8,   9];
  const minS = Math.min(...scores);
  return boneIds[scores.indexOf(minS)];
}

// ─── Vertex blending ──────────────────────────────────────────────────────────
// For each vertex near a joint, blend between its bone and the adjacent bone.
// This creates a soft deformable zone at joints (brief: "narrow deformable mesh band").
function computeVertexBlends(verts, vertBone, sp, blendRadius) {
  return verts.map((v, i) => {
    const bone = vertBone[i];
    const bd = BONE_DEFS[bone];

    // Special: torso vertices near shoulder joints blend with the arm bones
    // (shoulders are branch joints not on the torso bone path, so normal
    //  pivot/end blending doesn't reach them, causing seams when arms move)
    if (bone === 1) { // torso
      // Use a wider blend zone for shoulders so the torso socket smoothly
      // deforms with the arm, preventing visible gaps or seams.
      const shoulderR = blendRadius * 2;
      const dLS = Math.hypot(v.x - sp[J.LS].x, v.y - sp[J.LS].y);
      const dRS = Math.hypot(v.x - sp[J.RS].x, v.y - sp[J.RS].y);
      if (dLS < shoulderR && dLS <= dRS) {
        const w = dLS / shoulderR; // 0 at joint (fully arm) → 1 at edge (fully torso)
        return { bone, blendBone: 2, w }; // → upperArmL
      }
      if (dRS < shoulderR) {
        const w = dRS / shoulderR;
        return { bone, blendBone: 4, w }; // → upperArmR
      }
    }

    const dPivot = Math.hypot(v.x - sp[bd.pivot].x, v.y - sp[bd.pivot].y);
    const dEnd   = Math.hypot(v.x - sp[bd.end].x,   v.y - sp[bd.end].y);

    // Near the END of this bone: blend with child bone (the one whose pivot = bd.end)
    if (dEnd < blendRadius) {
      const childBone = BONE_DEFS.findIndex(b => b.pivot === bd.end && b.id !== bone);
      if (childBone >= 0) {
        const w = dEnd / blendRadius; // 0 at joint (fully child) → 1 at edge (fully self)
        return { bone, blendBone: childBone, w };
      }
    }

    // Near the PIVOT of this bone: blend with parent bone
    if (dPivot < blendRadius && BONE_PARENT[bone] >= 0) {
      const w = dPivot / blendRadius; // 0 at pivot (fully parent) → 1 at edge (fully self)
      return { bone, blendBone: BONE_PARENT[bone], w };
    }

    return { bone, blendBone:-1, w:1.0 };
  });
}

// ─── Mesh generation ──────────────────────────────────────────────────────────
function generateMesh(spacing) {
  const W = state.spriteW, H = state.spriteH;
  const cols = Math.ceil(W / spacing) + 1;
  const rows = Math.ceil(H / spacing) + 1;
  const verts = [];
  const vertGrid = new Array(rows * cols).fill(-1);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = Math.min(c * spacing, W), y = Math.min(r * spacing, H);
      let hasAlpha = false;
      outer: for (let dy = -spacing; dy <= spacing; dy += spacing) {
        for (let dx = -spacing; dx <= spacing; dx += spacing) {
          if (getAlpha(x+dx, y+dy) > 10) { hasAlpha = true; break outer; }
        }
      }
      if (hasAlpha) { vertGrid[r*cols+c] = verts.length; verts.push({x, y}); }
    }
  }

  const tris = [];
  for (let r = 0; r < rows - 1; r++) {
    for (let c = 0; c < cols - 1; c++) {
      const i00 = vertGrid[r*cols+c], i10 = vertGrid[(r+1)*cols+c];
      const i01 = vertGrid[r*cols+(c+1)], i11 = vertGrid[(r+1)*cols+(c+1)];
      if (i00>=0 && i10>=0 && i01>=0) tris.push([i00,i10,i01]);
      if (i10>=0 && i11>=0 && i01>=0) tris.push([i10,i11,i01]);
    }
  }
  return {verts, tris};
}

// ─── FK ─────────────────────────────────────────────────────────────────────
function boneAngle(joints, p, e) {
  return Math.atan2(joints[e].y - joints[p].y, joints[e].x - joints[p].x);
}
function angleDelta(ref, frame, p, e) {
  let d = boneAngle(frame, p, e) - boneAngle(ref, p, e);
  while (d >  Math.PI) d -= 2*Math.PI;
  while (d < -Math.PI) d += 2*Math.PI;
  return d;
}

function computeFK(frameMotion, sp) {
  const ref = state.poseData.mirrored[0];
  const H = state.spriteH;
  const yScaleFactor = parseFloat(document.getElementById('yScale').value) / 100;
  const yDelta = (frameMotion[J.PELVIS].y - ref[J.PELVIS].y) * H * yScaleFactor;

  const nj = sp.map(p => ({x:p.x, y:p.y + yDelta}));

  function fk(par, child, delta) {
    const ox = sp[child].x - sp[par].x, oy = sp[child].y - sp[par].y;
    const c = Math.cos(delta), s = Math.sin(delta);
    nj[child] = { x: nj[par].x + ox*c - oy*s, y: nj[par].y + ox*s + oy*c };
  }

  fk(J.PELVIS, J.NECK,  angleDelta(ref, frameMotion, J.PELVIS, J.NECK));
  fk(J.PELVIS, J.LH,    angleDelta(ref, frameMotion, J.PELVIS, J.LH));
  fk(J.PELVIS, J.RH,    angleDelta(ref, frameMotion, J.PELVIS, J.RH));
  fk(J.NECK,   J.HEAD,  angleDelta(ref, frameMotion, J.NECK,   J.HEAD));
  fk(J.NECK,   J.LS,    angleDelta(ref, frameMotion, J.NECK,   J.LS));
  fk(J.NECK,   J.RS,    angleDelta(ref, frameMotion, J.NECK,   J.RS));
  // Clamp shoulders horizontally: prevent them from moving inward past the rest-pose
  // position, which causes the upper arm to visually penetrate the torso.
  nj[J.LS].x = Math.min(nj[J.LS].x, sp[J.LS].x);
  nj[J.RS].x = Math.max(nj[J.RS].x, sp[J.RS].x);
  fk(J.LS,     J.LE,    angleDelta(ref, frameMotion, J.LS,     J.LE));
  fk(J.RS,     J.RE,    angleDelta(ref, frameMotion, J.RS,     J.RE));
  fk(J.LE,     J.LW,    angleDelta(ref, frameMotion, J.LE,     J.LW));
  fk(J.RE,     J.RW,    angleDelta(ref, frameMotion, J.RE,     J.RW));
  fk(J.LH,     J.LK,    angleDelta(ref, frameMotion, J.LH,     J.LK));
  fk(J.RH,     J.RK,    angleDelta(ref, frameMotion, J.RH,     J.RK));
  fk(J.LK,     J.LA,    angleDelta(ref, frameMotion, J.LK,     J.LA));
  fk(J.RK,     J.RA,    angleDelta(ref, frameMotion, J.RK,     J.RA));

  const boneDeltas = BONE_DEFS.map(bd => angleDelta(ref, frameMotion, bd.pivot, bd.end));
  return {nj, boneDeltas};
}

function rotateAroundBone(v, boneId, nj, boneDeltas, sp) {
  const bd = BONE_DEFS[boneId];
  const ox = v.x - sp[bd.pivot].x, oy = v.y - sp[bd.pivot].y;
  const c = Math.cos(boneDeltas[boneId]), s = Math.sin(boneDeltas[boneId]);
  return { x: nj[bd.pivot].x + ox*c - oy*s, y: nj[bd.pivot].y + ox*s + oy*c };
}

function transformVertex(v, blend, nj, boneDeltas, sp) {
  const primary = rotateAroundBone(v, blend.bone, nj, boneDeltas, sp);
  if (blend.blendBone < 0) return primary;
  const secondary = rotateAroundBone(v, blend.blendBone, nj, boneDeltas, sp);
  return {
    x: primary.x * blend.w + secondary.x * (1 - blend.w),
    y: primary.y * blend.w + secondary.y * (1 - blend.w),
  };
}

// ─── Build all frames ─────────────────────────────────────────────────────────
async function buildMesh() {
  if (!state.spriteImg || !state.poseData) return;
  buildMeshBtn.disabled = true;
  exportBtn.disabled = true;
  setStatus('building mesh...', '');
  buildPrgF.style.width = '5%';
  await sleep(10);

  const spacing = parseInt(document.getElementById('meshDensity').value);
  const blendRadius = parseFloat(document.getElementById('blendRadius').value);
  const {verts, tris} = generateMesh(spacing);

  // Sprite joint positions in pixels (cached)
  const W = state.spriteW, H = state.spriteH;
  const sp = state.joints.map(j => ({x: j.x*W, y: j.y*H}));

  // Assign each VERTEX to a bone (zone-based)
  const vertBone = new Int8Array(verts.length);
  verts.forEach((v, i) => { vertBone[i] = segBoneXY(v.x, v.y, sp); });

  // Precompute per-vertex blend weights
  const vertBlend = computeVertexBlends(verts, vertBone, sp, blendRadius);

  // Assign each TRIANGLE to one bone by centroid (FIX: each tri drawn exactly once)
  const triBone = new Int8Array(tris.length);
  tris.forEach((tri, t) => {
    const cx = (verts[tri[0]].x + verts[tri[1]].x + verts[tri[2]].x) / 3;
    const cy = (verts[tri[0]].y + verts[tri[1]].y + verts[tri[2]].y) / 3;
    triBone[t] = segBoneXY(cx, cy, sp);
  });

  buildPrgF.style.width = '20%';
  meshInfo.textContent = `${verts.length} verts, ${tris.length} tris`;
  await sleep(10);

  // Precompute all frame transforms
  const allFrames = [];
  const totalFrames = state.poseData.mirrored.length;
  for (let fi = 0; fi < totalFrames; fi++) {
    if (fi % 4 === 0) { buildPrgF.style.width = (20 + 75*fi/totalFrames)+'%'; await sleep(0); }
    const {nj, boneDeltas} = computeFK(state.poseData.mirrored[fi], sp);
    const transformed = verts.map((v, i) => transformVertex(v, vertBlend[i], nj, boneDeltas, sp));
    allFrames.push({nj, boneDeltas, transformed});
  }

  state.mesh = {verts, tris, vertBone, triBone, vertBlend};
  state.frames = allFrames;
  state.currentFrame = 0;
  buildPrgF.style.width = '100%';
  await sleep(50); buildPrgF.style.width = '0';

  timeline.max = totalFrames - 1; timeline.value = 0;
  frameLabel.textContent = `1 / ${totalFrames}`;
  buildMeshBtn.disabled = false;
  exportBtn.disabled = false;
  setStatus(`animated: ${totalFrames} frames`, 'ok');
  drawFrame();
}
buildMeshBtn.addEventListener('click', buildMesh);
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Rendering ────────────────────────────────────────────────────────────────
function drawTexTriangle(fctx, img, d0, d1, d2, s0, s1, s2) {
  const dx1=d1.x-d0.x, dy1=d1.y-d0.y, dx2=d2.x-d0.x, dy2=d2.y-d0.y;
  const sx1=s1.x-s0.x, sy1=s1.y-s0.y, sx2=s2.x-s0.x, sy2=s2.y-s0.y;
  const det = sx1*sy2 - sx2*sy1;
  if (Math.abs(det) < 0.01) return;
  const a=(dx1*sy2-dx2*sy1)/det, b=(dy1*sy2-dy2*sy1)/det;
  const c=(dx2*sx1-dx1*sx2)/det, d=(dy2*sx1-dy1*sx2)/det;
  const e=d0.x-a*s0.x-c*s0.y,   f=d0.y-b*s0.x-d*s0.y;
  fctx.save();
  fctx.beginPath();
  fctx.moveTo(d0.x,d0.y); fctx.lineTo(d1.x,d1.y); fctx.lineTo(d2.x,d2.y);
  fctx.closePath(); fctx.clip();
  fctx.transform(a,b,c,d,e,f);
  fctx.drawImage(img, 0, 0);
  fctx.restore();
}

function renderFrameToCtx(fctx, fi, frameW, frameH) {
  const pad = CANVAS_PAD;
  fctx.clearRect(0, 0, frameW + 2*pad, frameH + 2*pad);
  fctx.imageSmoothingEnabled = true;
  fctx.imageSmoothingQuality = 'high';
  const fd = state.frames[fi];
  const {verts, tris, triBone} = state.mesh;
  const {transformed} = fd;
  const showBones = parseInt(document.getElementById('showBones').value);

  for (const boneId of DRAW_ORDER) {
    for (let t = 0; t < tris.length; t++) {
      if (triBone[t] !== boneId) continue; // each tri drawn exactly ONCE
      const tri = tris[t];
      const s0=verts[tri[0]], s1=verts[tri[1]], s2=verts[tri[2]];
      // Offset destination coords into padded canvas space
      const d0={x:transformed[tri[0]].x+pad, y:transformed[tri[0]].y+pad};
      const d1={x:transformed[tri[1]].x+pad, y:transformed[tri[1]].y+pad};
      const d2={x:transformed[tri[2]].x+pad, y:transformed[tri[2]].y+pad};
      if (showBones) {
        // Debug: draw solid colored triangles by bone
        fctx.beginPath();
        fctx.moveTo(d0.x,d0.y); fctx.lineTo(d1.x,d1.y); fctx.lineTo(d2.x,d2.y);
        fctx.closePath();
        fctx.fillStyle = BONE_DBG_COLORS[boneId] + '99';
        fctx.fill();
      } else {
        drawTexTriangle(fctx, state.spriteImg, d0,d1,d2, s0,s1,s2);
      }
    }
  }
}

function drawFrame() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (!state.spriteImg) {
    ctx.fillStyle = '#111'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#5a5a78'; ctx.font='12px monospace'; ctx.textAlign='center';
    ctx.fillText('Drop sprite PNG and pose JSON to begin', W/2, H/2);
    return;
  }

  ctx.save();
  ctx.translate(viewOffX, viewOffY);
  ctx.scale(viewScale, viewScale);

  if (!state.mesh || !state.frames.length) {
    ctx.drawImage(state.spriteImg, 0, 0);
    drawSkeleton(state.joints.map(j=>({x:j.x*state.spriteW, y:j.y*state.spriteH})), true);
    ctx.restore(); return;
  }

  // Render the deformed mesh frame (padded canvas so arms don't clip)
  const pad = CANVAS_PAD;
  const fc = document.createElement('canvas');
  fc.width = state.spriteW + 2*pad; fc.height = state.spriteH + 2*pad;
  renderFrameToCtx(fc.getContext('2d'), state.currentFrame, state.spriteW, state.spriteH);
  ctx.drawImage(fc, -pad, -pad); // draw at -pad offset so sprite stays at origin

  const fd = state.frames[state.currentFrame];
  const showMesh = +document.getElementById('showMesh').value;
  if (showMesh) drawMeshOverlay(fd.transformed, state.mesh.tris);
  if (+document.getElementById('showSkel').value) drawSkeleton(fd.nj, false);
  drawJointHandle(fd.nj);

  ctx.restore();
}

function drawMeshOverlay(transformed, tris) {
  ctx.strokeStyle = 'rgba(78,205,196,0.15)';
  ctx.lineWidth = 0.4;
  for (const tri of tris) {
    const d0=transformed[tri[0]], d1=transformed[tri[1]], d2=transformed[tri[2]];
    ctx.beginPath();
    ctx.moveTo(d0.x,d0.y); ctx.lineTo(d1.x,d1.y); ctx.lineTo(d2.x,d2.y);
    ctx.closePath(); ctx.stroke();
  }
}

function drawSkeleton(jp, interactive) {
  const pairs = [[J.NECK,J.HEAD],[J.NECK,J.LS],[J.NECK,J.RS],[J.LS,J.LE],[J.LE,J.LW],
                 [J.RS,J.RE],[J.RE,J.RW],[J.PELVIS,J.NECK],[J.PELVIS,J.LH],[J.PELVIS,J.RH],
                 [J.LH,J.LK],[J.LK,J.LA],[J.RH,J.RK],[J.RK,J.RA]];
  ctx.lineWidth = 1.5;
  pairs.forEach(([a,b]) => {
    if (!jp[a]||!jp[b]) return;
    ctx.beginPath(); ctx.moveTo(jp[a].x,jp[a].y); ctx.lineTo(jp[b].x,jp[b].y);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.stroke();
  });
  jp.forEach((p,i) => {
    if (!p) return;
    ctx.beginPath(); ctx.arc(p.x, p.y, interactive ? 5/viewScale : 3, 0, Math.PI*2);
    ctx.fillStyle = J_COLORS[i]; ctx.fill();
    if (state.selectedJoint === i) {
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    }
  });
}

function drawJointHandle(jp) {
  if (state.selectedJoint < 0) return;
  const p = jp[state.selectedJoint]; if (!p) return;
  ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
  ctx.strokeStyle = J_COLORS[state.selectedJoint]; ctx.lineWidth = 1.5; ctx.stroke();
}

// ─── Playback ──────────────────────────────────────────────────────────────────
playBtn.addEventListener('click', () => {
  if (!state.frames.length) return;
  state.playing = !state.playing;
  playBtn.textContent = state.playing ? '⏸' : '▶';
  if (state.playing) scheduleNext();
});
function scheduleNext() {
  if (!state.playing) return;
  const fps = state.poseData?.fps || 16;
  setTimeout(() => {
    if (!state.playing) return;
    state.currentFrame = (state.currentFrame + 1) % state.frames.length;
    timeline.value = state.currentFrame;
    frameLabel.textContent = `${state.currentFrame+1} / ${state.frames.length}`;
    drawFrame(); scheduleNext();
  }, 1000/fps);
}
timeline.addEventListener('input', () => {
  state.currentFrame = parseInt(timeline.value);
  frameLabel.textContent = `${state.currentFrame+1} / ${state.poseData?.frameCount||0}`;
  drawFrame();
});

// ─── Export ────────────────────────────────────────────────────────────────────
exportBtn.addEventListener('click', async () => {
  if (!state.frames.length) return;
  exportBtn.disabled = true;
  setStatus('exporting...', '');
  const cols = parseInt(document.getElementById('expCols').value);
  const scale = parseInt(document.getElementById('expScale').value);
  const n = state.frames.length;
  const pad = CANVAS_PAD;
  const fw = state.spriteW + 2*pad, fh = state.spriteH + 2*pad;
  const rows = Math.ceil(n/cols);
  const oc = document.createElement('canvas');
  oc.width = cols*fw*scale; oc.height = rows*fh*scale;
  const ox = oc.getContext('2d');
  for (let fi = 0; fi < n; fi++) {
    if (fi % 4 === 0) { setStatus(`exporting ${fi+1}/${n}...`); await sleep(0); }
    const fc = document.createElement('canvas'); fc.width=fw; fc.height=fh;
    renderFrameToCtx(fc.getContext('2d'), fi, state.spriteW, state.spriteH);
    ox.drawImage(fc, (fi%cols)*fw*scale, Math.floor(fi/cols)*fh*scale, fw*scale, fh*scale);
  }
  oc.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `spritesheet_${n}f_${cols}col.png`;
    a.click();
    exportBtn.disabled = false;
    setStatus('export complete', 'ok');
  });
});

// ─── Init ─────────────────────────────────────────────────────────────────────
renderSetup();
drawFrame();
</script>
</body>
